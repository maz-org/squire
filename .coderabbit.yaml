language: en-US
reviews:
  auto_review:
    enabled: true
    auto_incremental_review: true
    ignore_title_keywords:
      - WIP
      - DO NOT MERGE
    drafts: false
    base_branches:
      - main
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  review_status: true
  path_filters:
    - '!data/**'
    - '!package-lock.json'
    # drizzle-kit generated, not hand-written — review would be noise.
    - '!src/db/migrations/**'
  path_instructions:
    - path: 'src/schemas.ts'
      instructions: 'Validate that Zod schemas match Frosthaven game data structures. Check for nullable fields that should be required and vice versa.'
    - path: 'test/**'
      instructions: 'External services (Claude API, GitHub API, OAuth providers, third-party HTTP) must be mocked. The local Postgres test DB is NOT an external service: DB-backed tests go through the canonical setupTestDb()/resetTestDb() helpers in test/helpers/db.ts and are the established pattern (auth-*, conversation, dev-login, server-oauth, seed-*, tools, vector-store, extracted-data — 13+ files). Do NOT flag setupTestDb/resetTestDb usage as a missing-mock violation. Committed fixtures under data/extracted/*.json are allowed and are loaded by test/helpers/global-setup.ts; they are regular checked-in JSON, not submodules. Check for proper use of vi.hoisted() when mock variables are referenced in vi.mock() factories.'
    - path: 'src/db/schema/**'
      instructions: 'Drizzle table definitions. Confirm new columns match docs/plans/storage-migration-tech-spec.md §Schema. Flag any unique constraint other than (game, source_id) on card_* tables, and flag any new schema.ts file that would collapse the core/auth/cards split (the split is required for parallel-lane execution).'
    - path: '**/*.css'
      instructions: 'Do NOT run stylelint or any other CSS linter, and do NOT leave stylistic/structural CSS feedback (quoting, spacing, selector patterns, at-rule validity, color notation, etc.) — we run stylelint in CI via .stylelintrc.json and that config is authoritative. Focus CSS review only on things stylelint cannot catch: design-system adherence (DESIGN.md tokens vs hard-coded hex), accessibility (contrast, focus states), and cross-browser correctness.'
  # Minimal useful toolset for this codebase: TypeScript + Node + vitest + a
  # handful of GitHub Actions workflows. Everything else CodeRabbit can run is
  # explicitly disabled to keep review signal-to-noise high and reviews fast.
  #
  # Kept:
  # - ast-grep      — cheap, catches common TS/JS anti-patterns
  # - eslint        — same config we run in CI
  # - actionlint    — real GitHub Actions bugs in .github/workflows/*.yml
  # - yamllint      — YAML syntax/indent for workflows + compose + this file
  # - github-checks — surfaces CI check results in the review
  #
  # Disabled (and why):
  # - biome        — duplicates eslint + prettier
  # - markdownlint — we run markdownlint-cli2 in CI ourselves
  # - stylelint    — we run stylelint in CI ourselves (SQR-70). Do not run any
  #                  CSS linter here; CI is the single source of truth for CSS
  #                  style/structure findings.
  # - shellcheck   — no shell scripts worth reviewing yet
  # - languagetool — prose nitpicks, low signal
  # - hadolint     — no Dockerfile in repo (docker-compose uses prebuilt image)
  # - semgrep      — too noisy at this codebase size; revisit if the threat model grows
  # - sqlfluff     — migrations are drizzle-kit generated, hand-lint adds noise
  tools:
    ast-grep:
      essential_rules: true
    eslint:
      enabled: true
    actionlint:
      enabled: true
    yamllint:
      enabled: true
    github-checks:
      enabled: true
      timeout_ms: 90000
    biome:
      enabled: false
    markdownlint:
      enabled: false
    stylelint:
      enabled: false
    shellcheck:
      enabled: false
    languagetool:
      enabled: false
    hadolint:
      enabled: false
    semgrep:
      enabled: false
    sqlfluff:
      enabled: false
chat:
  auto_reply: true
