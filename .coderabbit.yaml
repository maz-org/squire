language: en-US
reviews:
  auto_review:
    enabled: true
    auto_incremental_review: true
    ignore_title_keywords:
      - WIP
      - DO NOT MERGE
    drafts: false
    base_branches:
      - main
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  review_status: true
  path_filters:
    - "!data/**"
    - "!docs/**"
    - "!package-lock.json"
  path_instructions:
    - path: "src/schemas.ts"
      instructions: "Validate that Zod schemas match Frosthaven game data structures. Check for nullable fields that should be required and vice versa."
    - path: "src/extract-card-data.ts"
      instructions: "This uses Claude Haiku for vision OCR. Check rate limit handling, retry logic, and that extracted data is validated against Zod schemas."
    - path: "test/**"
      instructions: "All external services must be mocked. Tests must not depend on data files in data/ (gitignored). Check for proper use of vi.hoisted() when mock variables are referenced in vi.mock() factories."
  tools:
    ast-grep:
      essential_rules: true
    biome:
      enabled: false
    markdownlint:
      enabled: false
    shellcheck:
      enabled: false
    languagetool:
      enabled: false
    yamllint:
      enabled: true
    eslint:
      enabled: true
    github-checks:
      enabled: true
      timeout_ms: 90000
chat:
  auto_reply: true
