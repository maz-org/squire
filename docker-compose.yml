# Local development Postgres + pgvector.
#
# Pinned to pgvector/pgvector:pg16 at a tag available on Neon, Fly, Railway,
# Supabase, and Render so the Phase 1 host decision (Production Readiness
# project) stays open. Bump carefully — any change must preserve pgvector
# 0.7.x+ availability across those hosts.
#
# Usage:
#   docker compose up -d    # start
#   docker compose down     # stop (data persists in the named volume)
#   docker compose down -v  # stop and wipe data
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: squire-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: squire
      POSTGRES_PASSWORD: squire
      POSTGRES_DB: squire
    ports:
      - '5432:5432'
    volumes:
      - squire-pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U squire -d squire']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  squire-pgdata:
