name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    # Postgres + pgvector service container so integration tests can run
    # against a real DB. Required from SQR-32 onward — every issue in the
    # Storage & Data Migration project depends on this.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: squire
          POSTGRES_PASSWORD: squire
          POSTGRES_DB: squire_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U squire -d squire_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # CI intentionally points both DATABASE_URL and TEST_DATABASE_URL at the
    # same database — there's only one pgvector service container and no
    # "dev vs test" distinction at CI time. Do not split these.
    env:
      DATABASE_URL: postgres://squire:squire@localhost:5432/squire_test
      TEST_DATABASE_URL: postgres://squire:squire@localhost:5432/squire_test

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      # CSS build step removed with SQR-71 (ADR 0011): `/app.css` is now
      # compiled in-process at request time via @tailwindcss/node, so no
      # pre-build step exists or is needed. Vitest exercises the full
      # compile path in the test suite.

      - name: Run database migrations
        run: npm run db:migrate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src/ test/ scripts/

      - name: Lint CSS
        run: npm run lint:css

      - name: Lint markdown
        run: npm run lint:md

      - name: Format check
        run: npx prettier --check src/ test/

      - name: Test with coverage
        run: npx vitest run --coverage
